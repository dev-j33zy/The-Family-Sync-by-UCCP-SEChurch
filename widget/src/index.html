<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Sync Widget</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="theme-dark">
    <!-- Title Bar (hidden by default, shows on hover) -->
    <div id="titlebar">
      <div id="titlebar-drag">
          <span id="title-icon"><svg viewBox="0 0 64 64" width="16" height="16"><rect width="64" height="64" rx="10" fill="url(#g)"/><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6b0e1e"/><stop offset="100%" stop-color="#4a0a15"/></linearGradient></defs><text x="32" y="42" text-anchor="middle" font-family="Inter,Helvetica,sans-serif" font-size="24" font-weight="800" fill="#f5de8d" letter-spacing="1">SEC</text></svg></span>
        <span id="title-text">Family Sync</span>
      </div>
      <div id="titlebar-actions">
        <div id="menu-dots" class="dropdown">
          <button id="btn-dots" class="tb-btn" title="Menu">&ctdot;</button>
          <div id="dropdown-menu" class="dropdown-content hidden">
            <button id="dropdown-settings">&#9881; Settings</button>
            <button id="dropdown-refresh">&#8635; Refresh</button>
            <hr>
            <button id="dropdown-close">&#10005; Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- View Tabs -->
    <div id="view-tabs">
      <button id="tab-calendar" class="tab active" data-view="calendar">Calendar</button>
      <button id="tab-list" class="tab" data-view="list">Upcoming</button>
    </div>

    <!-- Content Area -->
    <div id="content">
      <div id="view-calendar" class="view active">
        <div id="calendar-legend">
          <span class="legend-item">
            <svg class="legend-svg legend-birthday" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="0.8">
              <path d="M3 7h10v7a1 1 0 01-1 1H4a1 1 0 01-1-1V7z"/>
              <rect x="4" y="4" width="2" height="3" rx="0.5"/>
              <rect x="7" y="3" width="2" height="4" rx="0.5"/>
              <rect x="10" y="4" width="2" height="3" rx="0.5"/>
              <rect x="2" y="7" width="12" height="1.5" rx="0.5"/>
            </svg>
            Birthday
          </span>
          <span class="legend-item">
            <svg class="legend-svg legend-anniversary" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="0.8">
              <path d="M8 14C2 9 0 6 0 4.5 0 2 2 0 4.5 0 6 0 7.5 1 8 2 8.5 1 10 0 11.5 0 14 0 16 2 16 4.5 16 6 14 9 8 14z"/>
            </svg>
            Anniversary
          </span>
        </div>
        <div id="calendar-header">
          <button id="cal-prev" class="cal-nav">&#8249;</button>
          <span id="cal-label"></span>
          <button id="cal-next" class="cal-nav">&#8250;</button>
        </div>
        <div id="calendar-grid"></div>
        <div id="calendar-tooltip-area" class="hidden"></div>
      </div>

      <div id="view-list" class="view">
        <div id="events-list"></div>
      </div>

      <!-- Settings Panel (above everything including tabs) -->
      <div id="settings-panel" class="hidden">
        <div class="settings-group">
          <label>Font Size</label>
          <input type="range" id="s-font-size" min="10" max="24" step="1">
        </div>
        <div class="settings-group">
          <label>Font Family</label>
          <div class="font-picker" id="s-font-family-picker">
            <input type="text" id="s-font-family" class="font-picker-input" readonly placeholder="Select font...">
            <div class="font-picker-options hidden" id="s-font-options">
              <div class="font-option" data-value="Segoe UI, sans-serif">Segoe UI</div>
              <div class="font-option" data-value="system-ui, sans-serif">System UI</div>
              <div class="font-option" data-value="Arial, sans-serif">Arial</div>
              <div class="font-option" data-value="Consolas, monospace">Consolas</div>
              <div class="font-option" data-value="Georgia, serif">Georgia</div>
              <div class="font-option" data-value="'Comic Sans MS', cursive">Comic Sans</div>
              <div class="font-option" data-value="Tahoma, sans-serif">Tahoma</div>
              <div class="font-option" data-value="Verdana, sans-serif">Verdana</div>
              <div class="font-option" data-value="'Courier New', monospace">Courier New</div>
              <div class="font-option" data-value="'Times New Roman', serif">Times New Roman</div>
              <div class="font-option" data-value="'Trebuchet MS', sans-serif">Trebuchet MS</div>
            </div>
          </div>
        </div>
        <div class="settings-group">
          <label>Background Color</label>
          <input type="color" id="s-bg-color">
        </div>
        <div class="settings-group">
          <label>Background Opacity</label>
          <input type="range" id="s-bg-opacity" min="0.2" max="1" step="0.01">
        </div>
        <div class="settings-group">
          <label>Text Opacity</label>
          <input type="range" id="s-text-opacity" min="0.3" max="1" step="0.01">
        </div>
        <div class="settings-group">
          <label>Theme</label>
          <div class="font-picker" id="s-theme-picker">
            <input type="text" id="s-theme-input" class="font-picker-input" readonly placeholder="Select theme...">
            <div class="font-picker-options hidden" id="s-theme-options">
              <div class="font-option" data-value="dark">Dark</div>
              <div class="font-option" data-value="light">Light</div>
              <div class="font-option" data-value="yellow">Yellow Note</div>
              <div class="font-option" data-value="pink">Pink Note</div>
            </div>
          </div>
        </div>
        <div class="settings-group">
          <label>Start on Windows Login</label>
          <label class="toggle-label">
            <input type="checkbox" id="s-auto-start">
            <span class="toggle-slider"></span>
            <span id="s-auto-start-label">Off</span>
          </label>
        </div>
        <div class="settings-group">
          <label>Always on Top</label>
          <label class="toggle-label">
            <input type="checkbox" id="s-always-on-top">
            <span class="toggle-slider"></span>
            <span id="s-always-on-top-label">On</span>
          </label>
        </div>
        <div class="settings-group">
          <label>Start in System Tray</label>
          <label class="toggle-label">
            <input type="checkbox" id="s-start-in-tray">
            <span class="toggle-slider"></span>
            <span id="s-start-in-tray-label">Off</span>
          </label>
        </div>
        <button id="btn-settings-close" class="btn-primary">Done</button>
        <div id="settings-version"></div>
      </div>
    </div>

    <!-- Update Notification -->
    <div id="update-notification" class="hidden">
      <div id="update-content">
        <div id="update-text">Update available: <span id="update-version"></span></div>
        <div id="update-actions">
          <button id="update-install">Install</button>
          <button id="update-remind">Remind Later</button>
        </div>
      </div>
    </div>

    <!-- Resize Handle -->
    <div id="resize-handle"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
